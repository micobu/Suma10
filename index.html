<script>
    const COLS = 9;
    const ROWS = 25;
    let numbers = []; // Flat array of numbers or null
    let score = 0;
    let level = 1;
    let selectedIndex = null;
    let hintsLeft = 3;
    let history = [];

    const grid = document.getElementById('game-grid');
    const scoreDisplay = document.getElementById('score-display');
    const levelDisplay = document.getElementById('level-display');
    const overlay = document.getElementById('game-over-overlay');
    const hintCountDisplay = document.getElementById('hint-count');

    function initGame() {
        numbers = [];
        addNumbers(40, true);
        updateUI();
    }

    function addNumbers(count = 40, initial = false) {
        let pool = [];
        if (initial) {
            pool = [1, 2, 3, 4, 5, 6, 7, 8, 9];
        } else {
            const currentValues = new Set(numbers.filter(n => n !== null));
            pool = Array.from(currentValues);
            if (pool.length === 0) pool = [1, 2, 3, 4, 5, 6, 7, 8, 9];
        }

        const newNums = [];
        for (let i = 0; i < count; i++) {
            newNums.push(pool[Math.floor(Math.random() * pool.length)]);
        }

        // Fill null spots first if they exist at the end, otherwise push
        numbers = numbers.concat(newNums);
        
        overlay.classList.add('hidden');
        renderBoard();
        checkMoves();
        updateIndicators();
    }

    function renderBoard() {
        grid.innerHTML = '';
        // Always render at least a full grid 9x25
        const totalToRender = Math.max(numbers.length, COLS * ROWS);
        
        for (let i = 0; i < totalToRender; i++) {
            const tile = document.createElement('div');
            tile.className = 'grid-tile transition-all duration-150';
            
            const num = i < numbers.length ? numbers[i] : null;
            
            if (num !== null) {
                tile.innerText = num;
                tile.dataset.index = i;
                tile.onclick = () => handleTileClick(i);
                if (selectedIndex === i) tile.classList.add('tile-selected');
            } else {
                tile.innerText = '';
            }
            grid.appendChild(tile);
        }
        checkEmptyRows();
    }

    function handleTileClick(index) {
        if (selectedIndex === null) {
            selectedIndex = index;
            renderBoard();
        } else if (selectedIndex === index) {
            selectedIndex = null;
            renderBoard();
        } else {
            const num1 = numbers[selectedIndex];
            const num2 = numbers[index];

            if (num1 !== null && num2 !== null) {
                const canMatch = (num1 + num2 === 10) || (num1 === num2);
                if (canMatch && areAdjacent(selectedIndex, index)) {
                    processMatch(selectedIndex, index);
                } else {
                    selectedIndex = index;
                    renderBoard();
                }
            } else {
                selectedIndex = index;
                renderBoard();
            }
        }
    }

    function areAdjacent(idx1, idx2) {
        const start = Math.min(idx1, idx2);
        const end = Math.max(idx1, idx2);

        const r1 = Math.floor(idx1 / COLS), c1 = idx1 % COLS;
        const r2 = Math.floor(idx2 / COLS), c2 = idx2 % COLS;

        // Path check helper
        const isPathClear = (s, e, step) => {
            for (let i = s + step; i < e; i += step) {
                if (numbers[i] !== null) return false;
            }
            return true;
        };

        // Linear Adjacency (Horizontal wrapping path)
        let onlyNullBetween = true;
        for (let i = start + 1; i < end; i++) {
            if (numbers[i] !== null) {
                onlyNullBetween = false;
                break;
            }
        }
        if (onlyNullBetween) return true;

        // Vertical Adjacency
        if (c1 === c2) {
            if (isPathClear(start, end, COLS)) return true;
        }

        // Diagonal Adjacency
        const rowDiff = Math.abs(r1 - r2);
        const colDiff = Math.abs(c1 - c2);
        if (rowDiff === colDiff) {
            const rowDir = r2 > r1 ? 1 : -1;
            const colDir = c2 > c1 ? 1 : -1;
            const step = (rowDir * COLS) + colDir;
            
            let diagClear = true;
            let current = idx1 + step;
            while (current !== idx2) {
                if (numbers[current] !== null) {
                    diagClear = false;
                    break;
                }
                current += step;
            }
            if (diagClear) return true;
        }

        return false;
    }

    function processMatch(idx1, idx2) {
        history.push([...numbers]);
        if (history.length > 20) history.shift();

        showFloatingScore(10);
        score += 10;
        
        numbers[idx1] = null;
        numbers[idx2] = null;
        selectedIndex = null;
        
        renderBoard();
        updateUI();
        checkMoves();
        updateIndicators();
    }

    function updateIndicators() {
        const currentValues = new Set(numbers.filter(n => n !== null));
        for (let i = 1; i <= 9; i++) {
            const indicator = document.getElementById(`indicator-${i}`);
            if (currentValues.has(i)) {
                indicator.classList.remove('indicator-cleared');
            } else {
                indicator.classList.add('indicator-cleared');
            }
        }
    }

    function checkEmptyRows() {
        let changed = false;
        // Start from bottom and check COLS blocks
        for (let i = Math.floor((numbers.length - 1) / COLS) * COLS; i >= 0; i -= COLS) {
            const row = numbers.slice(i, i + COLS);
            if (row.length === COLS && row.every(n => n === null)) {
                numbers.splice(i, COLS);
                score += 50;
                changed = true;
            }
        }
        
        // Remove trailing nulls to keep data clean
        while(numbers.length > 0 && numbers[numbers.length - 1] === null) {
            numbers.pop();
            changed = true;
        }

        if (changed) {
            renderBoard();
            updateUI();
            updateIndicators();
        }
    }

    function checkMoves() {
        const actives = numbers.map((n, i) => n !== null ? i : -1).filter(i => i !== -1);
        let hasMoves = false;

        for (let i = 0; i < actives.length; i++) {
            for (let j = i + 1; j < actives.length; j++) {
                const idx1 = actives[i];
                const idx2 = actives[j];
                const n1 = numbers[idx1], n2 = numbers[idx2];
                if ((n1 + n2 === 10 || n1 === n2) && areAdjacent(idx1, idx2)) {
                    hasMoves = true;
                    break;
                }
            }
            if (hasMoves) break;
        }

        if (!hasMoves && numbers.some(n => n !== null)) {
            overlay.classList.remove('hidden');
        } else if (numbers.length === 0 || !numbers.some(n => n !== null)) {
            level++;
            addNumbers(40, true);
        }
    }

    function showHint() {
        if (hintsLeft <= 0) return;
        const actives = numbers.map((n, i) => n !== null ? i : -1).filter(i => i !== -1);
        for (let i = 0; i < actives.length; i++) {
            for (let j = i + 1; j < actives.length; j++) {
                const idx1 = actives[i];
                const idx2 = actives[j];
                if ((numbers[idx1] + numbers[idx2] === 10 || numbers[idx1] === numbers[idx2]) && areAdjacent(idx1, idx2)) {
                    const tiles = grid.children;
                    tiles[idx1].classList.add('tile-hint');
                    tiles[idx2].classList.add('tile-hint');
                    setTimeout(() => {
                        tiles[idx1]?.classList.remove('tile-hint');
                        tiles[idx2]?.classList.remove('tile-hint');
                    }, 2000);
                    hintsLeft--;
                    updateUI();
                    return;
                }
            }
        }
    }

    function shuffleBoard() {
        const filtered = numbers.filter(n => n !== null);
        for (let i = filtered.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
        }
        let fIdx = 0;
        numbers = numbers.map(n => n === null ? null : filtered[fIdx++]);
        renderBoard();
        checkMoves();
    }

    function undoMove() {
        if (history.length > 0) {
            numbers = history.pop();
            selectedIndex = null;
            renderBoard();
            updateIndicators();
            checkMoves();
        }
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        levelDisplay.innerText = level;
        hintCountDisplay.innerText = hintsLeft;
    }

    function showFloatingScore(pts) {
        const float = document.createElement('div');
        float.className = 'absolute left-1/2 top-1/2 -translate-x-1/2 pointer-events-none z-50';
        float.innerHTML = `<span class="font-bold text-3xl text-[#00647c] floating-score">+${pts}</span>`;
        document.getElementById('score-float-container').appendChild(float);
        setTimeout(() => float.remove(), 1000);
    }

    initGame();
</script>
</body></html>
